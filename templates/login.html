{% extends 'base.html' %}
{% block title %}Login - Fake News Detection{% endblock %}
{% block content %}
<section class="card">
  <h2>Login</h2>
  <form method="post" action="{{ url_for('auth.login') }}" class="form">
    <label class="label">Username</label>
    <input class="input" name="username" type="text" autocomplete="username" required />

    <label class="label">Password</label>
    <input class="input" name="password" type="password" autocomplete="current-password" required />

    <button class="btn" type="submit">Login</button>
  </form>

  <div class="muted">
    No account? <a href="{{ url_for('auth.register') }}">Register</a>
  </div>
</section>
{% endblock %}
