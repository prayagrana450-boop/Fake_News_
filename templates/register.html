{% extends 'base.html' %}
{% block title %}Register - Fake News Detection{% endblock %}
{% block content %}
<section class="card">
  <h2>Create account</h2>
  <form method="post" action="{{ url_for('auth.register') }}" class="form">
    <label class="label">Username</label>
    <input class="input" name="username" type="text" autocomplete="username" required />

    <label class="label">Email</label>
    <input class="input" name="email" type="email" autocomplete="email" required />

    <label class="label">Password</label>
    <input class="input" name="password" type="password" autocomplete="new-password" required />

    <label class="label">Confirm password</label>
    <input class="input" name="confirm_password" type="password" autocomplete="new-password" required />

    <button class="btn" type="submit">Register</button>
  </form>

  <div class="muted">
    Already have an account? <a href="{{ url_for('auth.login') }}">Login</a>
  </div>
</section>
{% endblock %}
